# https://render.com/docs/blueprint-spec
#
# Python: ``PYTHON_VERSION`` below + repo ``runtime.txt`` + ``backend/runtime.txt`` (if Root Dir is ``backend``).
# If deploy still shows 3.14, set Python 3.12 in the Web Service Settings UI.
#
# Postgres: link DB or set ``DATABASE_URL``. If auth fails, use split vars instead (see ``backend/database.py``):
# COOKUP_DB_HOST, COOKUP_DB_USER, COOKUP_DB_PASSWORD, COOKUP_DB_NAME, optional COOKUP_DB_PORT.
# Free web services cannot use persistent disks; use managed Postgres for durable data.
services:
  - type: web
    name: beat-battle
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: COOKUP_JWT_SECRET
        generateValue: true
