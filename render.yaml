# https://render.com/docs/blueprint-spec
#
# Persistent SQLite: DATABASE_URL points at a file on the mounted disk so data survives redeploys.
# (Services with a disk cannot be horizontally scaled — fine for in-memory multiplayer.)
services:
  - type: web
    name: beat-battle
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: cookup-db
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: COOKUP_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////var/data/cookup.db
