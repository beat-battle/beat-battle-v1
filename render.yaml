# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: beat-battle
    runtime: python
    # This tells Render to ping /health instead of /
    # Ensure you create an @app.get("/health") route in your FastAPI/Flask code!
    healthCheckPath: /health 
    buildCommand: apt-get update -y && apt-get install -y --no-install-recommends ffmpeg && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=* --ws-ping-interval 25 --ws-ping-timeout 120
    envVars:
      - key: COOKUP_JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: COOKUP_TRUST_PROXY_HEADERS
        value: "true"
      - key: COOKUP_HTTP_RATE_LIMIT_RATE
        value: "90"
      - key: COOKUP_HTTP_RATE_LIMIT_WINDOW_S
        value: "10"
      - key: COOKUP_LOBBIES_CACHE_TTL_S
        value: "5"
      - key: PYTHONUNBUFFERED
        value: "true"